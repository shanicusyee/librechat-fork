name: Evidence Collection (Manual)

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "Application URL (ALB URL)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  evidence:
    name: Evidence Collection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Evidence Agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r evidence_agent/requirements.txt

      - name: Run Evidence Agent
        id: evidence-run
        env:
          APP_URL: ${{ inputs.app_url }}
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          AWS_REGION: ap-southeast-1
        run: |
          python -m evidence_agent.main 2>&1 | tee evidence-output.log
          S3_URI=$(grep -oP '(?<=Evidence artifacts uploaded to: ).*' evidence-output.log || echo "")
          echo "s3_uri=${S3_URI}" >> "$GITHUB_OUTPUT"

      - name: Output S3 URI in job summary
        run: |
          S3_URI="${{ steps.evidence-run.outputs.s3_uri }}"
          echo "## Evidence Collection Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Evidence artifacts uploaded to:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${S3_URI}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Log diagnostic details on failure
        if: failure()
        run: |
          echo "::error::Evidence collection failed. See diagnostic details below."
          echo "--- Evidence Agent Output ---"
          cat evidence-output.log 2>/dev/null || echo "No output log available."
          echo "--- Environment ---"
          echo "APP_URL: ${{ inputs.app_url }}"
          echo "S3_BUCKET: (from secrets)"
          echo "GITHUB_RUN_ID: ${{ github.run_id }}"
          echo "AWS_REGION: ap-southeast-1"
